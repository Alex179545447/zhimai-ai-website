<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智脉AI - 注册信息管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0a0e27; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .back-link { color: #4d7cff; text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .back-link:hover { color: #6b93ff; }
        h1 { font-size: 28px; font-weight: 600; background: linear-gradient(135deg, #4d7cff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .refresh-btn { background: linear-gradient(135deg, #4d7cff, #00d4ff); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: transform 0.3s, box-shadow 0.3s; }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(77, 124, 255, 0.4); }
        .refresh-btn:active { transform: translateY(0); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; text-align: center; transition: transform 0.3s, box-shadow 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .stat-number { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, #4d7cff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 14px; }
        .table-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(77, 124, 255, 0.15); padding: 16px 12px; text-align: left; font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.7); }
        td { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .delete-btn { background: rgba(255,71,87,0.2); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .delete-btn:hover { background: rgba(255,71,87,0.3); }
        .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.5); }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            .table-container { overflow-x: auto; }
            table { min-width: 800px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← 返回官网</a>
            <h1>智脉AI - 注册管理后台</h1>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总注册人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="hrCount">0</div>
                <div class="stat-label">企业HR</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="headhunterCount">0</div>
                <div class="stat-label">猎头顾问</div>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>用户类型</th>
                        <th>身份类型</th>
                        <th>姓名</th>
                        <th>微信号</th>
                        <th>电话号码</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dataBody">
                    <tr><td colspan="8" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';
        
        async function loadData() {
            const tbody = document.getElementById('dataBody');
            tbody.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
            
            try {
                const response = await fetch(API_URL + '?t=' + Date.now());
                const data = await response.json();
                
                let totalCount = 0;
                let hrCount = 0;
                let headhunterCount = 0;
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="empty-icon">📭</div>暂无注册信息</td></tr>';
                } else {
                    let html = '';
                    data.forEach((item, index) => {
                        totalCount++;
if (item.identityType === '企业HR') hrCount++;
                        if (item.identityType === '猎头顾问') headhunterCount++;
                        
                        html += '<tr>';
                        html += '<td>' + (index + 1) + '</td>';
                        html += '<td>' + (item.userType || '-') + '</td>';
                        html += '<td>' + (item.identityType || '-') + '</td>';
                        html += '<td>' + escapeHtml(item.name) + '</td>';
                        html += '<td>' + escapeHtml(item.wechat) + '</td>';
                        html += '<td>' + escapeHtml(item.phone) + '</td>';
                        html += '<td>' + (item.timestamp || '-') + '</td>';
                        html += '<td><button class="delete-btn" onclick="deleteRecord(' + item.id + ')">删除</button></td>';
                        html += '</tr>';
                    });
                    tbody.innerHTML = html;
                }
                
                document.getElementById('totalCount').textContent = totalCount;
                document.getElementById('hrCount').textContent = hrCount;
                document.getElementById('headhunterCount').textContent = headhunterCount;
                
            } catch (error) {
                console.error('加载数据失败:', error);
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="empty-icon">❌</div>加载失败，请检查网络连接</td></tr>';
            }
        }
        
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert('删除成功');
                    loadData();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (error) {
                alert('删除失败，请检查网络连接');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '-';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面加载时自动获取数据
        loadData();
    </script>
</body>
</html>
